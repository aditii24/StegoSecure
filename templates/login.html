{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Login</h2>
  <form method="post">
    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>
    <input name="token" placeholder="2FA token (6 digits)" required>
    <button type="submit">Login</button>
  </form>
  <p class="redirect-text">
  Don't have account?
  <a href="{{ url_for('register') }}" class="redirect-link">Register</a>
</p>
</div>
{% endblock %}
